<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sour House - 上海深夜指南 Ultimate</title>
    <style>
        :root {
            --spacing-unit: 8px;
            --line-color: #f0ede5;
            --bg-dark: #000000;
            --font-main: "Helvetica", "Arial", "PingFang SC", sans-serif;
            --dice-size: 60px;
            --bounce-transition: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            font-family: var(--font-main);
            color: var(--line-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 140px; /* 进一步下沉，容纳更丰富的文案内容 */
            position: relative;
        }

        /* ————— 3D 手绘骰子 ————— */
        .scene {
            width: var(--dice-size);
            height: var(--dice-size);
            perspective: 600px;
            cursor: pointer;
            z-index: 10;
        }
        
        .scene:active { transform: scale(0.9); }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg);
            transition: transform 0.8s var(--bounce-transition);
        }

        .dice-face {
            position: absolute;
            width: var(--dice-size);
            height: var(--dice-size);
            background: var(--bg-dark);
            border: 1.5px solid var(--line-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            filter: url(#rough-edge);
        }

        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        /* ————— 治愈系气泡 ————— */
        #advice-bubble {
            position: absolute;
            bottom: calc(100% + 36px); 
            background: var(--line-color);
            color: #222;
            padding: calc(var(--spacing-unit) * 3);
            border-radius: 24px;
            width: 280px; 
            font-size: 13px;
            line-height: 1.6;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: none;
            opacity: 0;
            transform: translateY(15px) scale(0.9);
            transform-origin: bottom center;
            transition: all 0.5s var(--bounce-transition);
            z-index: 20;
        }

        #advice-bubble.active {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        #advice-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--line-color) transparent transparent transparent;
        }

        .shop-name { font-weight: bold; font-size: 18px; display: block; margin-bottom: 4px; }
        .shop-soul { color: #d44; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: block; }
        .shop-desc { margin: 8px 0; color: #333; }
        .shop-drink { background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 8px; margin: 10px 0; font-size: 12px; border-left: 3px solid #222; }

        /* ————— 按钮 & 记录 ————— */
        #reset-btn {
            margin-top: 40px;
            padding: 12px 32px;
            background: transparent;
            color: var(--line-color);
            border: 1.2px solid var(--line-color);
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            filter: url(#rough-edge);
        }

        #reset-btn.visible { opacity: 0.8; pointer-events: auto; }

        #history {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            height: 30px;
            font-size: 16px;
            font-weight: bold;
            color: var(--line-color);
            opacity: 0.5;
        }

        .dot-item { animation: pop-in 0.4s var(--bounce-transition); }
        @keyframes pop-in { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #hand-drawn-filter { position: absolute; width: 0; height: 0; }
    </style>
</head>
<body>

    <svg id="hand-drawn-filter">
        <filter id="rough-edge">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" />
        </filter>
    </svg>

    <div class="main-container">
        <div id="advice-bubble">
            <span class="shop-name" id="b-name"></span>
            <span class="shop-soul" id="b-soul"></span>
            <div class="shop-desc" id="b-desc"></div>
            <div class="shop-drink" id="b-drink"></div>
            <div class="shop-loc" id="b-loc" style="font-size: 11px; color: #666; margin-top: 8px; opacity: 0.8;"></div>
        </div>

        <div class="scene" onclick="roll()">
            <div class="dice" id="dice">
                <div class="dice-face front">1</div>
                <div class="dice-face back">6</div>
                <div class="dice-face right">3</div>
                <div class="dice-face left">4</div>
                <div class="dice-face top">2</div>
                <div class="dice-face bottom">5</div>
            </div>
        </div>

        <button id="reset-btn" onclick="resetGame()">换一家店，再掷一次</button>
        <div id="history"></div>
    </div>

    <script>
        let totalScore = 0;
        let isAdviceShown = false;
        let isRolling = false;
        
        // 📍 上海 20 家精选酒吧深度数据库
        const shanghaiGuide = [
            { name: "Speak Low 彼楼", soul: "日式调酒的魔幻暗门", desc: "穿越器材店的密室，三层楼三重境界。抹茶与调酒的终极对话。", drink: "特色点：抹茶风味 Bacardi 特调，优雅的微苦感。", loc: "📍 静安区复兴中路579号" },
            { name: "The Tailor Bar", soul: "静安寺上空的裁缝间", desc: "俯瞰静安寺繁华。这里不设酒单，调酒师如裁缝般为你缝合风味。", drink: "特色点：高空景观配上完全定制化的独一份味道。", loc: "📍 静安区华山路2号4楼" },
            { name: "Ars & Delecto", soul: "进贤路上的日式瑰宝", desc: "银座风格的教科书。黑胶唱片与精准动作，深夜治愈的极简主义。", drink: "特色点：Gimlet，干净清爽，精准如手术刀。", loc: "📍 黄浦区进贤路222号" },
            { name: "The Odd Couple", soul: "双子星大师的对冲", desc: "Shingo与Steve。80年代未来主义风格，对比尝试两种极致风格。", drink: "特色点：创意十足的酒单，风格跨度极大。", loc: "📍 黄浦区新天地25号楼" },
            { name: "Epic", soul: "魔都最具活力的屋檐下", desc: "氛围轻松跳跃。主理人Cross将上海灵魂注入酒杯，惊喜不断。", drink: "特色点：Black Pearl，层次深邃的味觉迷宫。", loc: "📍 徐汇区高邮路17号" },
            { name: "J.Boroski", soul: "昆虫标本与风味盲盒", desc: "极度私密，无酒单。让调酒师捕捉你当下的情绪进行即兴创作。", drink: "特色点：昆虫装饰与绝无仅有的口味定制。", loc: "📍 静安区富民路" },
            { name: "Sober Company", soul: "新天地的三明治空间", desc: "集咖啡、餐饮、酒吧于一体。最深处的隐藏房间是寻味终点。", drink: "特色点：Sober Manhattan，极致的苦甜平衡感。", loc: "📍 黄浦区马当路/新天地" },
            { name: "Antique Cafe & Bar", soul: "时间静止的老派酒吧", desc: "进贤路古董表店内，在这喝一杯，仿佛回到了上世纪老上海。", drink: "特色点：充满木质香气的宁静感，适合长谈。", loc: "📍 黄浦区进贤路" },
            { name: "Bar No.3", soul: "兴国路上的温情角落", desc: "不设防的治愈感。灯光克制而温暖，调酒水平稳健如故。", drink: "特色点：Negroni，经典而厚重，回味悠长。", loc: "📍 徐汇区兴国路" },
            { name: "O.B.P", soul: "巨鹿路韩系烟火气", desc: "韩式街头感。除了特调，这里的炸鸡也是深夜必尝的灵魂伴侣。", drink: "特色点：韩系风味特调，搭配炸鸡堪称一绝。", loc: "📍 静安区巨鹿路758号" },
            { name: "Co-Sign", desc: "胶州路上的禅意绿洲。日式极简风，主打纯净口感，适合独处的一杯。", soul: "独酌者的静谧港湾", drink: "特色点：极简金汤力，通透而纯净。", loc: "📍 静安区胶州路" },
            { name: "Atelier by Taste Buds", soul: "工业废墟里的香料实验室", desc: "巨鹿路758，将香料与草本运用到极致，风格粗犷而细腻。", drink: "特色点：多层次的香料风味碰撞，极具冲击力。", loc: "📍 静安区巨鹿路" },
            { name: "The Union Trading Co.", soul: "陆遥的温馨美式酒吧", desc: "蝉联亚洲50佳。像家一样随性，却是世界级的技术门槛。", drink: "特色点：酒单充满巧思，服务如老友般亲切。", loc: "📍 徐汇区衡山路附近" },
            { name: "Punch Room", soul: "艾迪逊酒店的高空精致", desc: "主打Punch风格。17楼的景观与深紫色调，奢华而不失格调。", drink: "特色点：Punch特调，果香与基酒的曼妙共舞。", loc: "📍 黄浦区南京东路" },
            { name: "Lab", soul: "静安区的老牌‘实验室’", desc: "上海最早的一批威士忌Bar。老式皮质沙发与沉重木质感，经典耐喝。", drink: "特色点：极广的威士忌收藏，是威士忌迷的圣地。", loc: "📍 静安区武定路" },
            { name: "The Old Man", soul: "向海明威致敬之作", desc: "全店围绕《老人与海》。酒单以海明威的作品命名，创意惊艳。", drink: "特色点：独特的食材发酵与澄清技术。", loc: "📍 黄浦区茂名南路" },
            { name: "Suzy Wine Bar", soul: "充满法式慵懒的小酒馆", desc: "安福路附近的秘密。主打自然酒与精选特调，氛围极度浪漫。", drink: "特色点：氛围感拉满，适合约会后的二次微醺。", loc: "📍 徐汇区华山路" },
            { name: "Laundry Co.", soul: "洗衣房背后的喧嚣", desc: "门头是假洗衣房，内里是充满工业风的活力Bar。惊喜感十足。", drink: "特色点：进店的过程极具趣味性，氛围热闹。", loc: "📍 静安区襄阳北路" },
            { name: "Hush", soul: "思南路上的隐秘‘嘘声’", desc: "黑白色调，极简高级。调酒师冷静专注，专注于风味本身。", drink: "特色点：风格极简，酒体质感非常细腻。", loc: "📍 黄浦区思南路" },
            { name: "Black Rock", soul: "围绕橡木桶的威士忌体验", desc: "长达数米的巨大原木桌，威士忌在桌面下的酒槽内陈酿流淌。", drink: "特色点：极具视觉冲击力的威士忌分享方式。", loc: "📍 静安区富民路" }
        ];

        const dice = document.getElementById('dice');
        const bubble = document.getElementById('advice-bubble');
        const resetBtn = document.getElementById('reset-btn');
        const history = document.getElementById('history');

        const angleMap = { 1: {x:0, y:0}, 2: {x:-90, y:0}, 3: {x:0, y:-90}, 4: {x:0, y:90}, 5: {x:90, y:0}, 6: {x:180, y:0} };

        function roll() {
            if (isAdviceShown || isRolling) return;
            isRolling = true;
            
            const result = Math.floor(Math.random() * 6) + 1;
            const randX = (Math.floor(Math.random() * 2) + 2) * 360;
            const randY = (Math.floor(Math.random() * 2) + 2) * 360;
            
            dice.style.transform = `rotateX(${randX + angleMap[result].x}deg) rotateY(${randY + angleMap[result].y}deg)`;

            setTimeout(() => {
                isRolling = false;
                totalScore += result;
                
                // 实时显示点数
                const span = document.createElement('span');
                span.className = 'dot-item';
                span.innerText = result;
                history.appendChild(span);

                // 只有累计点数达到10或以上才弹出
                if (totalScore >= 10) showAdvice();
            }, 800);
        }

        function showAdvice() {
            const shop = shanghaiGuide[Math.floor(Math.random() * shanghaiGuide.length)];
            document.getElementById('b-name').innerText = shop.name;
            document.getElementById('b-soul').innerText = shop.soul;
            document.getElementById('b-desc').innerText = shop.desc;
            document.getElementById('b-drink').innerText = shop.drink;
            document.getElementById('b-loc').innerText = shop.loc;
            
            bubble.style.display = 'block';
            setTimeout(() => {
                bubble.classList.add('active');
                resetBtn.classList.add('visible');
            }, 50);
            isAdviceShown = true;
        }

        function resetGame() {
            bubble.classList.remove('active');
            resetBtn.classList.remove('visible');
            setTimeout(() => {
                bubble.style.display = 'none';
                totalScore = 0;
                history.innerHTML = '';
                isAdviceShown = false;
                dice.style.transform = `rotateX(-20deg) rotateY(30deg)`;
            }, 400);
        }
    </script>
</body>
</html>
